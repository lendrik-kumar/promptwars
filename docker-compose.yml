version: '3.8'

services:
  carboniq:
    build: .
    container_name: carboniq_prod
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - carboniq_data:/app/data
    restart: unless-stopped

volumes:
  carboniq_data:
